<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القدرات التفاعلي - أ/ عبدالعزيز الفيفي</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #4a148c; --secondary: #7b1fa2; --bg: #f5f5f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; }
        h2 { color: var(--primary); }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; background: none; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .option-btn:hover { border-color: var(--secondary); background: #f3e5f5; }
        .hidden { display: none; }
        input[type="text"] { width: 80%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-start { background: var(--primary); color: white; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; }
        #feedback { margin-top: 20px; font-weight: bold; font-size: 1.2rem; min-height: 1.5em; }
        .copyright { font-size: 0.8rem; color: #777; margin-top: 20px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="login-section">
        <h2>اختبار القدرات المنوع</h2>
        <p>ثانوية الأمير عبدالمجيد</p>
        <input type="text" id="student-name" placeholder="أدخل اسمك هنا...">
        <br>
        <button class="btn-start" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-section" class="hidden">
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <div id="feedback"></div>
        <div class="copyright">حقوق الملكية محفوظة لـ أ/ عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد</div>
    </div>

    <div id="result-section" class="hidden">
        <h2>انتهى الاختبار</h2>
        <h1 id="final-score"></h1>
        <p>✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓</p>
    </div>
</div>

<script>
    // نظام حماية الملكية ومنع الإعادة
    const LOCK_KEY = "qudrat_exam_completed_v1";
    
    const quizData = [
        { q: "قوي : متين (تناظر لفظي)", options: ["إيمان : جنة", "نتيجة : سبب", "حب : امتلاك", "زهيد : رخيص"], correct: 3, hint: "العلاقة هي الترادف." },
        { q: "السرير : النوم (تناظر لفظي)", options: ["المستشفى : المرض", "المدرسة : العلم", "الملعب : اللعب", "الكرسي : الجلوس"], correct: 3, hint: "العلاقة مكانية وظيفية." },
        { q: "إذا كنت تريد النجاح فـ ..... العقبات (إكمال جمل)", options: ["تجنب", "تجاهل", "ذلل", "ارسم"], correct: 2, hint: "النجاح يتطلب تذليل الصعوبات." },
        { q: "المتفائل يرى فرصة في كل ..... (إكمال جمل)", options: ["صعوبة", "سهولة", "طريق", "فشل"], correct: 0, hint: "التفاؤل هو رؤية الضوء وسط الظلام." },
        { q: "من زاد عقله قل ..... (إكمال جمل)", options: ["ماله", "كلامه", "صديقه", "خوفه"], correct: 1, hint: "الحكمة تقتضي الصمت." },
        { q: "الرجل الصالح هو من يتحمل خيرات جيرانه (خطأ سياقي)", options: ["الصالح", "يتحمل", "خيرات", "جيرانه"], correct: 2, hint: "الصحيح: يتحمل (أذى) جيرانه." },
        { q: "العظمة هي أن تبتسم والدموع في عينك (خطأ سياقي)", options: ["العظمة", "تبتسم", "الدموع", "عينك"], correct: 0, hint: "الجملة صحيحة تماماً لكن في بعض النماذج قد تأتي كلمة 'تبكي' بدلاً من تبتسم." }, // ملاحظة: وضعتها لاختبار التركيز
        { q: "الاستغفار يفتح الأقفال ويشرح البال (إكمال جمل)", options: ["الحديدية", "المغلقة", "القديمة", "الصعبة"], correct: 1, hint: "الاستغفار مفتاح لكل باب مغلق." },
        { q: "فصل : صيف (تناظر لفظي)", options: ["يوم : ساعة", "سنة : شهر", "أسبوع : سبت", "وقت : فجر"], correct: 2, hint: "جزء من كل (السبت جزء من الأسبوع)." },
        { q: "طبيب : سماعة (تناظر لفظي)", options: ["جندي : سلاح", "مهندس : بناء", "معلم : سبورة", "فلاح : زرع"], correct: 0, hint: "الأداة المستخدمة في المهنة." },
        { q: "المعلم الناجح هو الذي يثبط طلابه للوصول للقمة (خطأ سياقي)", options: ["المعلم", "يثبط", "طلابه", "القمة"], correct: 1, hint: "الصحيح: (يحفز) طلابه." },
        { q: "العين : الرؤية (تناظر لفظي)", options: ["الأذن : السمع", "اللسان : التذوق", "القدم : المشي", "جميع ما سبق"], correct: 3, hint: "كلها أعضاء ووظيفتها." },
        { q: "من أراد العلى سهر ..... (إكمال جمل)", options: ["الليل", "النهار", "الليالي", "الفراش"], correct: 2, hint: "قول مأثور." },
        { q: "لا تجعل عوائقك تمنعك من التقدم نحو الفشل (خطأ سياقي)", options: ["عوائقك", "تمنعك", "التقدم", "الفشل"], correct: 3, hint: "الصحيح: نحو (النجاح)." },
        { q: "الصديق الحقيقي هو من يساندك وقت الرخاء (خطأ سياقي)", options: ["الصديق", "يساندك", "وقت", "الرخاء"], correct: 3, hint: "الصحيح: وقت (الشدة)." }
    ];

    let currentQ = 0;
    let score = 0;

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        if (!name) { alert("لطفاً، ادخل اسمك أولاً"); return; }
        
        if (localStorage.getItem(LOCK_KEY)) {
            alert("عذراً، لا يسمح بإعادة الاختبار من نفس الجهاز.");
            return;
        }

        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQ];
        document.getElementById('question-text').innerText = `سؤال ${currentQ + 1}: ${q.q}`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').innerText = '';

        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });
    }

    function checkAnswer(index) {
        const feedback = document.getElementById('feedback');
        const q = quizData[currentQ];
        
        if (index === q.correct) {
            score++;
            feedback.innerHTML = "<span style='color:green'>إجابة صحيحة! أحسنت يا بطل 🌟</span>";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            feedback.innerHTML = "<span style='color:red'>محاولة جيدة، واصل التركيز في السؤال القادم! 💪</span>";
        }

        setTimeout(() => {
            currentQ++;
            if (currentQ < quizData.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }, 2000);
    }

    function finishQuiz() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('final-score').innerText = `درجتك هي: ${score} من ${quizData.length}`;
        localStorage.setItem(LOCK_KEY, "true"); // قفل الإعادة
    }
</script>

</body>
</html>
