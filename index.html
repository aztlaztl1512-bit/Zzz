<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القدرات المنوع - أ/ عبدالعزيز الفيفي</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #4a148c; --secondary: #7b1fa2; --bg: #f5f5f5; --accent: #ff9800; --correct: #2e7d32; --wrong: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; position: relative; }
        #timer-bar { position: absolute; top: 0; right: 0; height: 6px; background: var(--accent); width: 100%; transition: width 1s linear; border-radius: 15px 15px 0 0; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; background: none; cursor: pointer; transition: 0.3s; font-size: 1.1rem; font-weight: 500; }
        .correct-flash { background-color: #e8f5e9 !important; border-color: var(--correct) !important; color: var(--correct); border-width: 3px !important; }
        .wrong-flash { background-color: #ffeeb2 !important; border-color: var(--wrong) !important; color: var(--wrong); }
        .hidden { display: none; }
        input[type="text"] { width: 85%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 2px solid #ddd; font-size: 1rem; }
        .btn-start { background: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        #feedback { margin-top: 15px; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; }
        #timer-text { font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .copyright { font-size: 0.85rem; color: #666; margin-top: 25px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="timer-bar"></div>
    
    <div id="login-section">
        <h2 style="color: var(--primary);">اختبار القدرات المنوع</h2>
        <p>ثانوية الأمير عبدالمجيد</p>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي لتبدأ...">
        <br>
        <button class="btn-start" onclick="startQuiz()">بدأ الاختبار</button>
    </div>

    <div id="quiz-section" class="hidden">
        <div id="timer-text">الوقت المتبقي: 40</div>
        <h3 id="question-title" style="color: var(--secondary); margin-bottom: 5px;"></h3>
        <h2 id="question-text" style="margin-top: 5px;"></h2>
        <div id="options-container"></div>
        <div id="feedback"></div>
        <div class="copyright">تصميم أ/ عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓</div>
    </div>

    <div id="result-section" class="hidden">
        <h2>تم اكتمال الاختبار بنجاح</h2>
        <h1 id="final-score" style="color: var(--primary);"></h1>
        <p>✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓</p>
    </div>
</div>

<script>
    const LOCK_KEY = "qudrat_final_lock_v3";
    let timeLeft = 40;
    let timerInterval;
    let currentQ = 0;
    let score = 0;
    const TRANSITION_DELAY = 5500; // التأخير الجديد: 5 ثواني ونصف

    const quizData = [
        { type: "التناظر اللفظي", q: "قوي : متين", options: ["إيمان : جنة", "نتيجة : سبب", "حب : امتلاك", "زهيد : رخيص"], correct: 3 },
        { type: "التناظر اللفظي", q: "السرير : النوم", options: ["المستشفى : المرض", "المدرسة : العلم", "الملعب : اللعب", "الكرسي : الجلوس"], correct: 3 },
        { type: "إكمال الجمل", q: "إذا كنت تريد النجاح فـ ..... العقبات", options: ["تجنب", "تجاهل", "ذلل", "ارسم"], correct: 2 },
        { type: "إكمال الجمل", q: "المتفائل يرى فرصة في كل .....", options: ["صعوبة", "سهولة", "طريق", "فشل"], correct: 0 },
        { type: "إكمال الجمل", q: "من زاد عقله قل .....", options: ["ماله", "كلامه", "صديقه", "خوفه"], correct: 1 },
        { type: "الخطأ السياقي", q: "الرجل الصالح هو من يتحمل خيرات جيرانه", options: ["الصالح", "يتحمل", "خيرات", "جيرانه"], correct: 2 },
        { type: "الخطأ السياقي", q: "العظمة هي أن تبتسم والدموع في عينك", options: ["العظمة", "تبتسم", "الدموع", "عينك"], correct: 0 },
        { type: "إكمال الجمل", q: "الاستغفار يفتح الأقفال ويشرح البال", options: ["الحديدية", "المغلقة", "القديمة", "الصعبة"], correct: 1 },
        { type: "التناظر اللفظي", q: "فصل : صيف", options: ["يوم : ساعة", "سنة : شهر", "أسبوع : سبت", "وقت : فجر"], correct: 2 },
        { type: "التناظر اللفظي", q: "طبيب : سماعة", options: ["جندي : سلاح", "مهندس : بناء", "معلم : سبورة", "فلاح : زرع"], correct: 0 },
        { type: "الخطأ السياقي", q: "المعلم الناجح هو الذي يثبط طلابه للوصول للقمة", options: ["المعلم", "يثبط", "طلابه", "القمة"], correct: 1 },
        { type: "التناظر اللفظي", q: "العين : الرؤية", options: ["الأذن : السمع", "اللسان : التذوق", "القدم : المشي", "جميع ما سبق"], correct: 3 },
        { type: "إكمال الجمل", q: "من أراد العلى سهر .....", options: ["الليل", "النهار", "الليالي", "الفراش"], correct: 2 },
        { type: "الخطأ السياقي", q: "لا تجعل عوائقك تمنعك من التقدم نحو الفشل", options: ["عوائقك", "تمنعك", "التقدم", "الفشل"], correct: 3 },
        { type: "الخطأ السياقي", q: "الصديق الحقيقي هو من يساندك وقت الرخاء", options: ["الصديق", "يساندك", "وقت", "الرخاء"], correct: 3 }
    ];

    function startQuiz() {
        if (!document.getElementById('student-name').value) { alert("لطفاً، ادخل اسمك أولاً"); return; }
        if (localStorage.getItem(LOCK_KEY)) { alert("عذراً، تم تقديم الاختبار مسبقاً من هذا الجهاز."); return; }
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQ];
        document.getElementById('question-title').innerText = `س ${currentQ + 1} في ( ${q.type} )`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').innerText = '';
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.id = `opt-${index}`;
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 40;
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                showCorrectAndNext(true);
            }
        }, 1000);
    }

    function updateTimerUI() {
        document.getElementById('timer-text').innerText = `الوقت المتبقي: ${timeLeft}`;
        document.getElementById('timer-bar').style.width = `${(timeLeft / 40) * 100}%`;
    }

    function checkAnswer(index) {
        clearInterval(timerInterval);
        disableOptions();
        const q = quizData[currentQ];
        if (index === q.correct) {
            score++;
            document.getElementById(`opt-${index}`).classList.add('correct-flash');
            document.getElementById('feedback').innerHTML = "<span style='color:green'>إجابة صحيحة! أحسنت يا بطل 🌟</span>";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            document.getElementById(`opt-${index}`).classList.add('wrong-flash');
            document.getElementById(`opt-${q.correct}`).classList.add('correct-flash');
            document.getElementById('feedback').innerHTML = "<span style='color:red'>محاولة جيدة، يواصل.. 💪 (الصواب بالأخضر)</span>";
        }
        setTimeout(nextQuestion, TRANSITION_DELAY);
    }

    function showCorrectAndNext(isTimedOut) {
        const q = quizData[currentQ];
        if (isTimedOut) {
            document.getElementById('feedback').innerHTML = "<span style='color:orange'>انتهى الوقت! الصواب موضح بالأخضر.. واصل 💪</span>";
            document.getElementById(`opt-${q.correct}`).classList.add('correct-flash');
        }
        disableOptions();
        setTimeout(nextQuestion, TRANSITION_DELAY);
    }

    function disableOptions() {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('final-score').innerText = `درجتك هي: ${score} من ${quizData.length}`;
        localStorage.setItem(LOCK_KEY, "true");
    }
</script>
</body>
</html>
